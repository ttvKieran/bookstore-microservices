# Server Configuration
spring.application.name=order-service
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-order}:${DB_PORT:5432}/${DB_NAME:order_db}
spring.datasource.username=${DB_USER:order_user}
spring.datasource.password=${DB_PASSWORD:order_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Service URLs
book.service.url=${BOOK_SERVICE_URL:http://book-service:8000}
customer.service.url=${CUSTOMER_SERVICE_URL:http://customer-service:8000}
cart.service.url=${CART_SERVICE_URL:http://cart-service:8000}
pay.service.url=${PAY_SERVICE_URL:http://pay-service:8080}
ship.service.url=${SHIP_SERVICE_URL:http://ship-service:8080}
# Kafka Configuration for Saga Pattern
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=order-service-saga
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.bookstore.orderservice.saga.SagaEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer