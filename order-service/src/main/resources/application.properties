# Server Configuration
spring.application.name=order-service
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-order}:${DB_PORT:5432}/${DB_NAME:order_db}
spring.datasource.username=${DB_USER:order_user}
spring.datasource.password=${DB_PASSWORD:order_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Service URLs
book.service.url=${BOOK_SERVICE_URL:http://book-service:8000}
customer.service.url=${CUSTOMER_SERVICE_URL:http://customer-service:8000}
cart.service.url=${CART_SERVICE_URL:http://cart-service:8000}
