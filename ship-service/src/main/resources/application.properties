# Server Configuration
spring.application.name=ship-service
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-shipment}:${DB_PORT:5432}/${DB_NAME:shipment_db}
spring.datasource.username=${DB_USER:shipment_user}
spring.datasource.password=${DB_PASSWORD:shipment_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true

# Service URLs
order.service.url=${ORDER_SERVICE_URL:http://order-service:8080}
